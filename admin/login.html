<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Login – TSLGC</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../assets/css/admin.css" />
</head>
<body class="admin-login-page">

  <div class="admin-login-card">
    <div class="alc-brand">
      <span class="alc-logo">TSLGC</span>
      <p>Admin Control Panel</p>
    </div>
    <h4 class="alc-title">Welcome Back</h4>
    <p class="alc-sub">Sign in to access the admin dashboard</p>

    <div id="loginToast" class="alc-toast" style="display:none"></div>

    <form id="adminLoginForm" novalidate>
      <div class="mb-3">
        <label class="form-label">Username / Email</label>
        <div class="alc-input-group">
          <i class="fa-solid fa-user"></i>
          <input type="text" class="form-control" id="adminUser" name="username" placeholder="admin username" required autocomplete="username" />
        </div>
      </div>
      <div class="mb-3">
        <label class="form-label">Password</label>
        <div class="alc-input-group">
          <i class="fa-solid fa-lock"></i>
          <input type="password" class="form-control" id="adminPass" name="password" placeholder="••••••••" required autocomplete="current-password" />
          <button type="button" class="alc-eye-btn" onclick="togglePassVis('adminPass', this)">
            <i class="fa-solid fa-eye"></i>
          </button>
        </div>
      </div>
      <button type="submit" class="btn btn-login w-100" id="loginBtn">
        <i class="fa-solid fa-right-to-bracket me-2"></i>Sign In
      </button>
    </form>

    <div class="alc-back mt-4">
      <a href="../index.html"><i class="fa-solid fa-arrow-left me-1"></i>Back to Website</a>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    function togglePassVis(inputId, btn) {
      const inp = document.getElementById(inputId);
      const icon = btn.querySelector('i');
      if (inp.type === 'password') {
        inp.type = 'text';
        icon.classList.replace('fa-eye', 'fa-eye-slash');
      } else {
        inp.type = 'password';
        icon.classList.replace('fa-eye-slash', 'fa-eye');
      }
    }

    document.getElementById('adminLoginForm').addEventListener('submit', function(e) {
      e.preventDefault();
      const btn = document.getElementById('loginBtn');
      btn.disabled = true;
      btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin me-2"></i>Signing in...';
      const data = {
        username: document.getElementById('adminUser').value.trim(),
        password: document.getElementById('adminPass').value
      };
      fetch('../backend/auth.php', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ action: 'admin_login', ...data })
      })
      .then(r => r.json())
      .then(res => {
        if (res.status === 'success') {
          window.location.href = 'dashboard.html';
        } else {
          const t = document.getElementById('loginToast');
          t.className = 'alc-toast error';
          t.textContent = res.message || 'Invalid credentials.';
          t.style.display = 'block';
          setTimeout(() => t.style.display = 'none', 4000);
        }
      })
      .catch(() => {
        const t = document.getElementById('loginToast');
        t.className = 'alc-toast error';
        t.textContent = 'Network error. Try again.';
        t.style.display = 'block';
        setTimeout(() => t.style.display = 'none', 4000);
      })
      .finally(() => {
        btn.disabled = false;
        btn.innerHTML = '<i class="fa-solid fa-right-to-bracket me-2"></i>Sign In';
      });
    });
  </script>

  <!-- FLOATING LANG TOGGLE -->
  <div class="floating-lang" id="floatingLang" style="position:fixed;bottom:1.5rem;right:1.5rem;z-index:1050;display:flex;flex-direction:column-reverse;align-items:flex-end;gap:0.5rem;">
    <div class="floating-lang-dropdown" id="floatingLangDropdown" style="display:flex;flex-direction:column;gap:0.4rem;align-items:flex-end;opacity:0;pointer-events:none;transform:translateY(8px);transition:opacity .18s,transform .18s;">
      <button onclick="switchLangOption('hi')" style="background:#fff;color:#060022;border:1px solid rgba(139,49,212,.25);border-radius:2rem;padding:.35rem 1rem;font-size:.82rem;font-weight:600;cursor:pointer;white-space:nowrap;box-shadow:0 2px 8px rgba(0,0,0,.1);">🇮🇳 हिन्दी</button>
      <button onclick="switchLangOption('en')" style="background:#fff;color:#060022;border:1px solid rgba(139,49,212,.25);border-radius:2rem;padding:.35rem 1rem;font-size:.82rem;font-weight:600;cursor:pointer;white-space:nowrap;box-shadow:0 2px 8px rgba(0,0,0,.1);">🇬🇧 English</button>
    </div>
    <button onclick="toggleLangDropdown()" title="Language" style="width:46px;height:46px;border-radius:50%;background:linear-gradient(135deg,#8B31D4,#060022);color:#fff;border:none;cursor:pointer;font-size:.8rem;font-weight:700;box-shadow:0 4px 16px rgba(139,49,212,.45);display:flex;align-items:center;justify-content:center;">
      <span id="floatingLangLabel">हि</span>
    </button>
  </div>
  <script>
    (function(){
      var KEY='uh-lang';
      var drop=document.getElementById('floatingLangDropdown');
      var lbl=document.getElementById('floatingLangLabel');
      var isOpen=false;
      function syncLabel(){var l=localStorage.getItem(KEY)||'en';if(lbl)lbl.textContent=l==='hi'?'हि':'EN';}
      function toggleLangDropdown(){isOpen=!isOpen;drop.style.opacity=isOpen?'1':'0';drop.style.pointerEvents=isOpen?'all':'none';drop.style.transform=isOpen?'translateY(0)':'translateY(8px)';}
      function switchLangOption(l){localStorage.setItem(KEY,l);document.documentElement.lang=l;syncLabel();toggleLangDropdown();}
      window.toggleLangDropdown=toggleLangDropdown;
      window.switchLangOption=switchLangOption;
      document.addEventListener('click',function(e){if(isOpen&&!e.target.closest('#floatingLang')){toggleLangDropdown();}});
      syncLabel();
    })();
  </script>
</body>
</html>
