<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Login – UnifyHub</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../assets/css/admin.css" />
</head>
<body class="admin-login-page">

  <div class="admin-login-card">
    <div class="alc-brand">
      <span class="alc-logo">UNIFY<span>HUB</span></span>
      <p>Admin Control Panel</p>
    </div>
    <h4 class="alc-title">Welcome Back</h4>
    <p class="alc-sub">Sign in to access the admin dashboard</p>

    <div id="loginToast" class="alc-toast" style="display:none"></div>

    <form id="adminLoginForm" novalidate>
      <div class="mb-3">
        <label class="form-label">Username / Email</label>
        <div class="alc-input-group">
          <i class="fa-solid fa-user"></i>
          <input type="text" class="form-control" id="adminUser" name="username" placeholder="admin username" required autocomplete="username" />
        </div>
      </div>
      <div class="mb-3">
        <label class="form-label">Password</label>
        <div class="alc-input-group">
          <i class="fa-solid fa-lock"></i>
          <input type="password" class="form-control" id="adminPass" name="password" placeholder="••••••••" required autocomplete="current-password" />
          <button type="button" class="alc-eye-btn" onclick="togglePassVis('adminPass', this)">
            <i class="fa-solid fa-eye"></i>
          </button>
        </div>
      </div>
      <button type="submit" class="btn btn-login w-100" id="loginBtn">
        <i class="fa-solid fa-right-to-bracket me-2"></i>Sign In
      </button>
    </form>

    <div class="alc-back mt-4">
      <a href="../index.html"><i class="fa-solid fa-arrow-left me-1"></i>Back to Website</a>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    function togglePassVis(inputId, btn) {
      const inp = document.getElementById(inputId);
      const icon = btn.querySelector('i');
      if (inp.type === 'password') {
        inp.type = 'text';
        icon.classList.replace('fa-eye', 'fa-eye-slash');
      } else {
        inp.type = 'password';
        icon.classList.replace('fa-eye-slash', 'fa-eye');
      }
    }

    document.getElementById('adminLoginForm').addEventListener('submit', function(e) {
      e.preventDefault();
      const btn = document.getElementById('loginBtn');
      btn.disabled = true;
      btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin me-2"></i>Signing in...';
      const data = {
        username: document.getElementById('adminUser').value.trim(),
        password: document.getElementById('adminPass').value
      };
      fetch('../backend/auth.php', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ action: 'admin_login', ...data })
      })
      .then(r => r.json())
      .then(res => {
        if (res.status === 'success') {
          window.location.href = 'dashboard.html';
        } else {
          const t = document.getElementById('loginToast');
          t.className = 'alc-toast error';
          t.textContent = res.message || 'Invalid credentials.';
          t.style.display = 'block';
          setTimeout(() => t.style.display = 'none', 4000);
        }
      })
      .catch(() => {
        const t = document.getElementById('loginToast');
        t.className = 'alc-toast error';
        t.textContent = 'Network error. Try again.';
        t.style.display = 'block';
        setTimeout(() => t.style.display = 'none', 4000);
      })
      .finally(() => {
        btn.disabled = false;
        btn.innerHTML = '<i class="fa-solid fa-right-to-bracket me-2"></i>Sign In';
      });
    });
  </script>
</body>
</html>
