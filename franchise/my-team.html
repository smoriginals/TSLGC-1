<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Team – TSLGC Franchise</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../assets/css/franchise.css" />
</head>
<body class="fr-body">
  <div class="fr-wrapper">
    <aside class="fr-sidebar" id="frSidebar">
      <div class="fr-sidebar-brand">
        <span class="fr-sb-logo">UH</span>
        <div><strong>TSLGC</strong><small>Franchise Portal</small></div>
      </div>
      <div class="fr-sidebar-user">
        <div class="fr-su-avatar"><i class="fa-solid fa-store"></i></div>
        <div><strong>Franchise Partner</strong><small id="frId">FR-0000</small></div>
      </div>
      <nav class="fr-sidebar-nav">
        <p class="fr-sidebar-label">Menu</p>
        <a href="dashboard.html" class="fr-sidebar-link"><i class="fa-solid fa-gauge-high"></i> Dashboard</a>
        <a href="my-team.html" class="fr-sidebar-link active"><i class="fa-solid fa-sitemap"></i> My Team</a>
        <a href="my-income.html" class="fr-sidebar-link"><i class="fa-solid fa-indian-rupee-sign"></i> My Income</a>
        <a href="my-leads.html" class="fr-sidebar-link"><i class="fa-solid fa-user-plus"></i> My Leads</a>
        <a href="profile.html" class="fr-sidebar-link"><i class="fa-solid fa-circle-user"></i> Profile</a>
        <p class="fr-sidebar-label">System</p>
        <a href="../index.html" class="fr-sidebar-link" target="_blank"><i class="fa-solid fa-globe"></i> Website</a>
        <a href="#" class="fr-sidebar-link fr-logout" onclick="frLogout()"><i class="fa-solid fa-right-from-bracket"></i> Logout</a>
      </nav>
    </aside>
    <div class="fr-sidebar-overlay" id="frSidebarOverlay" onclick="closeFrSidebar()"></div>
    <main class="fr-main">
      <header class="fr-topbar">
        <div class="fr-tb-left">
          <button class="fr-tb-toggle" id="frSidebarToggle"><i class="fa-solid fa-bars"></i></button>
          <span class="fr-tb-title">My Team</span>
        </div>
        <div class="fr-tb-right">
          <button class="fr-tb-btn" id="frThemeToggle"><i class="fa-solid fa-moon"></i></button>
        </div>
      </header>
      <div class="fr-content">
        <!-- Team Summary -->
        <div class="fr-stat-grid mb-4">
          <div class="fr-stat-card">
            <div class="fr-sc-icon fr-sc-purple"><i class="fa-solid fa-user"></i></div>
            <div class="fr-sc-info"><span class="fr-sc-value" id="l1Count">28</span><span class="fr-sc-label">Level 1 (Direct)</span></div>
          </div>
          <div class="fr-stat-card">
            <div class="fr-sc-icon fr-sc-gold"><i class="fa-solid fa-users"></i></div>
            <div class="fr-sc-info"><span class="fr-sc-value" id="l2Count">42</span><span class="fr-sc-label">Level 2</span></div>
          </div>
          <div class="fr-stat-card">
            <div class="fr-sc-icon fr-sc-teal"><i class="fa-solid fa-people-group"></i></div>
            <div class="fr-sc-info"><span class="fr-sc-value" id="l3Count">35</span><span class="fr-sc-label">Level 3</span></div>
          </div>
          <div class="fr-stat-card">
            <div class="fr-sc-icon fr-sc-blue"><i class="fa-solid fa-network-wired"></i></div>
            <div class="fr-sc-info"><span class="fr-sc-value" id="totalCount">124</span><span class="fr-sc-label">Total Team</span></div>
          </div>
        </div>

        <!-- Team Tree Visual -->
        <div class="fr-panel mb-4">
          <div class="fr-panel-header">
            <h5><i class="fa-solid fa-sitemap me-2"></i>Team Tree (Top 3 Levels)</h5>
          </div>
          <div class="fr-panel-body" style="overflow-x:auto">
            <div class="team-tree" id="teamTree">
              <!-- Rendered by JS -->
            </div>
          </div>
        </div>

        <!-- Full Team Table -->
        <div class="fr-panel">
          <div class="fr-panel-header">
            <h5><i class="fa-solid fa-table me-2"></i>Full Team List</h5>
            <div class="d-flex gap-2">
              <input type="text" class="form-control form-control-sm" id="teamSearch" placeholder="Search member…" style="width:200px" />
              <select class="form-select form-select-sm" id="levelFilter" style="width:130px">
                <option value="">All Levels</option>
                <option value="1">Level 1</option>
                <option value="2">Level 2</option>
                <option value="3">Level 3</option>
              </select>
            </div>
          </div>
          <div class="fr-panel-body p-0">
            <table class="fr-table w-100">
              <thead>
                <tr>
                  <th>Member ID</th>
                  <th>Name</th>
                  <th>Mobile</th>
                  <th>City</th>
                  <th>Level</th>
                  <th>Plan</th>
                  <th>Status</th>
                  <th>Joined</th>
                </tr>
              </thead>
              <tbody id="teamTableBody"></tbody>
            </table>
          </div>
        </div>
      </div>
    </main>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../assets/js/franchise.js"></script>
  <script>
    const mockTeam = [
      {id:'UH-0045', name:'Anjali Verma', mobile:'9876543210', city:'Jaipur', level:1, plan:'Full', status:'active', joined:'2025-01-10'},
      {id:'UH-0071', name:'Suresh Yadav', mobile:'9765432109', city:'Ajmer', level:1, plan:'Full', status:'active', joined:'2025-01-12'},
      {id:'UH-0089', name:'Pooja Gupta', mobile:'9654321098', city:'Jodhpur', level:2, plan:'Installment', status:'active', joined:'2025-01-18'},
      {id:'UH-0102', name:'Manoj Sharma', mobile:'9543210987', city:'Kota', level:2, plan:'Full', status:'active', joined:'2025-01-20'},
      {id:'UH-0115', name:'Rekha Mishra', mobile:'9432109876', city:'Udaipur', level:2, plan:'Full', status:'pending', joined:'2025-01-22'},
      {id:'UH-0128', name:'Vikram Singh', mobile:'9321098765', city:'Jaipur', level:3, plan:'Installment', status:'active', joined:'2025-01-25'},
      {id:'UH-0134', name:'Nita Patel', mobile:'9210987654', city:'Bikaner', level:3, plan:'Full', status:'active', joined:'2025-01-28'},
    ];

    let filteredTeam = [...mockTeam];

    function escHtml(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

    function renderTeamTable(data) {
      const tbody = document.getElementById('teamTableBody');
      if (!data.length) { tbody.innerHTML = '<tr><td colspan="8" class="text-center py-3 text-muted">No members found</td></tr>'; return; }
      tbody.innerHTML = data.map(m => `
        <tr>
          <td>${escHtml(m.id)}</td>
          <td>${escHtml(m.name)}</td>
          <td>${escHtml(m.mobile)}</td>
          <td>${escHtml(m.city)}</td>
          <td><span class="fr-level-badge fr-level-${m.level}">L${m.level}</span></td>
          <td>${escHtml(m.plan)}</td>
          <td><span class="fr-status ${m.status}">${m.status}</span></td>
          <td>${m.joined}</td>
        </tr>`).join('');
    }

    function renderTeamTree() {
      const tree = document.getElementById('teamTree');
      tree.innerHTML = `
        <div class="tree-me">
          <div class="tree-member tree-root"><i class="fa-solid fa-store"></i><span>You (FR)</span></div>
        </div>
        <div class="tree-level tree-l1">
          ${mockTeam.filter(m=>m.level===1).slice(0,5).map(m=>`
            <div class="tree-branch">
              <div class="tree-member"><i class="fa-solid fa-user"></i><span>${escHtml(m.name.split(' ')[0])}</span></div>
            </div>`).join('')}
        </div>
        <div class="tree-level tree-l2">
          ${mockTeam.filter(m=>m.level===2).slice(0,5).map(m=>`
            <div class="tree-branch">
              <div class="tree-member tree-l2m"><i class="fa-solid fa-user"></i><span>${escHtml(m.name.split(' ')[0])}</span></div>
            </div>`).join('')}
        </div>`;
    }

    function applyFilters() {
      const search = document.getElementById('teamSearch').value.toLowerCase();
      const level = document.getElementById('levelFilter').value;
      filteredTeam = mockTeam.filter(m => {
        const matchSearch = !search || m.name.toLowerCase().includes(search) || m.id.toLowerCase().includes(search) || m.city.toLowerCase().includes(search);
        const matchLevel = !level || String(m.level) === level;
        return matchSearch && matchLevel;
      });
      renderTeamTable(filteredTeam);
    }

    document.getElementById('teamSearch').addEventListener('input', applyFilters);
    document.getElementById('levelFilter').addEventListener('change', applyFilters);

    function loadTeam() {
      fetch('../backend/franchise-api.php?action=my_team')
        .then(r => r.json())
        .then(res => {
          const data = res.status === 'success' ? res.data : mockTeam;
          filteredTeam = data;
          renderTeamTable(data);
        })
        .catch(() => renderTeamTable(mockTeam));
    }

    function closeFrSidebar() {
      document.getElementById('frSidebar').classList.remove('open');
      document.getElementById('frSidebarOverlay').classList.remove('show');
    }
    function frLogout() {
      if (document.getElementById('frLogoutModal')) return;
      var md = document.createElement('div');
      md.id = 'frLogoutModal';
      md.style.cssText = 'position:fixed;inset:0;z-index:99999;display:flex;align-items:center;justify-content:center;';
      md.innerHTML =
        '<div id="frLMBack" style="position:absolute;inset:0;background:rgba(6,0,34,.55);"></div>' +
        '<div style="position:relative;background:#fff;border-radius:16px;padding:2rem 2rem 1.5rem;width:min(340px,90vw);text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.3);z-index:1;">' +
        '<div style="width:56px;height:56px;border-radius:50%;background:rgba(255,62,94,.12);display:flex;align-items:center;justify-content:center;margin:0 auto .9rem;">' +
        '<i class="fa-solid fa-right-from-bracket" style="font-size:1.4rem;color:#FF3E5E;"></i></div>' +
        '<h5 style="margin:0 0 .4rem;font-weight:700;font-size:1rem;color:#060022;">Logout?</h5>' +
        '<p style="margin:0 0 1.4rem;font-size:.86rem;color:#6b7280;">Are you sure you want to logout from your account?</p>' +
        '<div style="display:flex;gap:.7rem;justify-content:center;">' +
        '<button id="frLMYes" style="flex:1;max-width:130px;padding:.52rem 1rem;border:none;border-radius:8px;background:#FF3E5E;color:#fff;font-weight:600;font-size:.86rem;cursor:pointer;">Yes, Logout</button>' +
        '<button id="frLMNo" style="flex:1;max-width:130px;padding:.52rem 1rem;border:1px solid #d1d5db;border-radius:8px;background:transparent;color:#374151;font-weight:600;font-size:.86rem;cursor:pointer;">No, Cancel</button>' +
        '</div></div>';
      document.body.appendChild(md);
      function close() { md.remove(); }
      document.getElementById('frLMYes').onclick = function () { close(); window.location.href = 'login.html'; };
      document.getElementById('frLMNo').onclick = close;
      document.getElementById('frLMBack').onclick = close;
    }

    renderTeamTree();
    loadTeam();
  </script>

  <!-- FLOATING LANG TOGGLE -->
  <div class="floating-lang" id="floatingLang" style="position:fixed;bottom:1.5rem;right:1.5rem;z-index:1050;display:flex;flex-direction:column-reverse;align-items:flex-end;gap:0.5rem;">
    <div class="floating-lang-dropdown" id="floatingLangDropdown" style="display:flex;flex-direction:column;gap:0.4rem;align-items:flex-end;opacity:0;pointer-events:none;transform:translateY(8px);transition:opacity .18s,transform .18s;">
      <button onclick="switchLangOption('hi')" style="background:#fff;color:#060022;border:1px solid rgba(139,49,212,.25);border-radius:2rem;padding:.35rem 1rem;font-size:.82rem;font-weight:600;cursor:pointer;white-space:nowrap;box-shadow:0 2px 8px rgba(0,0,0,.1);">🇮🇳 हिन्दी</button>
      <button onclick="switchLangOption('en')" style="background:#fff;color:#060022;border:1px solid rgba(139,49,212,.25);border-radius:2rem;padding:.35rem 1rem;font-size:.82rem;font-weight:600;cursor:pointer;white-space:nowrap;box-shadow:0 2px 8px rgba(0,0,0,.1);">🇬🇧 English</button>
    </div>
    <button onclick="toggleLangDropdown()" title="Language" style="width:46px;height:46px;border-radius:50%;background:linear-gradient(135deg,#8B31D4,#060022);color:#fff;border:none;cursor:pointer;font-size:.8rem;font-weight:700;box-shadow:0 4px 16px rgba(139,49,212,.45);display:flex;align-items:center;justify-content:center;">
      <span id="floatingLangLabel">हि</span>
    </button>
  </div>
  <script>
    (function(){
      var KEY='uh-lang';
      var drop=document.getElementById('floatingLangDropdown');
      var lbl=document.getElementById('floatingLangLabel');
      var isOpen=false;
      function syncLabel(){var l=localStorage.getItem(KEY)||'en';if(lbl)lbl.textContent=l==='hi'?'हि':'EN';}
      function toggleLangDropdown(){isOpen=!isOpen;drop.style.opacity=isOpen?'1':'0';drop.style.pointerEvents=isOpen?'all':'none';drop.style.transform=isOpen?'translateY(0)':'translateY(8px)';}
      function switchLangOption(l){localStorage.setItem(KEY,l);document.documentElement.lang=l;syncLabel();toggleLangDropdown();}
      window.toggleLangDropdown=toggleLangDropdown;
      window.switchLangOption=switchLangOption;
      document.addEventListener('click',function(e){if(isOpen&&!e.target.closest('#floatingLang')){toggleLangDropdown();}});
      syncLabel();
    })();
  </script>
</body>
</html>
