<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Dashboard – UnifyHub Franchise</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../assets/css/franchise.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.2/dist/chart.umd.min.js"></script>
</head>
<body class="fr-body">
  <div class="fr-wrapper">
    <aside class="fr-sidebar" id="frSidebar">
      <div class="fr-sidebar-brand">
        <span class="fr-sb-logo">UH</span>
        <div><strong>UnifyHub</strong><small>Franchise Portal</small></div>
      </div>
      <div class="fr-sidebar-user">
        <div class="fr-su-avatar"><i class="fa-solid fa-store"></i></div>
        <div>
          <strong id="frUserName">Loading…</strong>
          <small id="frFranchiseId">FR-0000</small>
          <div class="fr-rank-badge fr-rank-gold mt-1" id="frRankBadge"><i class="fa-solid fa-star"></i> Gold</div>
        </div>
      </div>
      <nav class="fr-sidebar-nav">
        <p class="fr-sidebar-label">Menu</p>
        <a href="dashboard.html" class="fr-sidebar-link active"><i class="fa-solid fa-gauge-high"></i> Dashboard</a>
        <a href="my-team.html" class="fr-sidebar-link"><i class="fa-solid fa-sitemap"></i> My Team</a>
        <a href="my-income.html" class="fr-sidebar-link"><i class="fa-solid fa-indian-rupee-sign"></i> My Income</a>
        <a href="my-leads.html" class="fr-sidebar-link"><i class="fa-solid fa-user-plus"></i> My Leads</a>
        <a href="profile.html" class="fr-sidebar-link"><i class="fa-solid fa-circle-user"></i> Profile</a>
        <p class="fr-sidebar-label">System</p>
        <a href="../index.html" class="fr-sidebar-link" target="_blank"><i class="fa-solid fa-globe"></i> Website</a>
        <a href="#" class="fr-sidebar-link fr-logout" onclick="frLogout()"><i class="fa-solid fa-right-from-bracket"></i> Logout</a>
      </nav>
    </aside>
    <div class="fr-sidebar-overlay" id="frSidebarOverlay" onclick="closeFrSidebar()"></div>
    <main class="fr-main">
      <header class="fr-topbar">
        <div class="fr-tb-left">
          <button class="fr-tb-toggle" id="frSidebarToggle"><i class="fa-solid fa-bars"></i></button>
          <span class="fr-tb-title">Dashboard</span>
        </div>
        <div class="fr-tb-right">
          <button class="fr-tb-btn" id="frThemeToggle"><i class="fa-solid fa-moon"></i></button>
          <button class="fr-tb-btn" onclick="frLogout()"><i class="fa-solid fa-right-from-bracket"></i></button>
        </div>
      </header>
      <div class="fr-content">
        <!-- Stat Cards -->
        <div class="fr-stat-grid">
          <div class="fr-stat-card">
            <div class="fr-sc-icon fr-sc-purple"><i class="fa-solid fa-users"></i></div>
            <div class="fr-sc-info"><span class="fr-sc-value" id="statTeam">–</span><span class="fr-sc-label">My Team</span></div>
          </div>
          <div class="fr-stat-card">
            <div class="fr-sc-icon fr-sc-gold"><i class="fa-solid fa-indian-rupee-sign"></i></div>
            <div class="fr-sc-info"><span class="fr-sc-value" id="statEarnings">–</span><span class="fr-sc-label">Total Earnings</span></div>
          </div>
          <div class="fr-stat-card">
            <div class="fr-sc-icon fr-sc-teal"><i class="fa-solid fa-briefcase"></i></div>
            <div class="fr-sc-info"><span class="fr-sc-value" id="statBiz">101</span><span class="fr-sc-label">Active Businesses</span></div>
          </div>
          <div class="fr-stat-card">
            <div class="fr-sc-icon fr-sc-blue"><i class="fa-solid fa-user-plus"></i></div>
            <div class="fr-sc-info"><span class="fr-sc-value" id="statLeads">–</span><span class="fr-sc-label">New Leads</span></div>
          </div>
        </div>

        <!-- Charts Row -->
        <div class="row g-4 mb-4">
          <div class="col-lg-7">
            <div class="fr-panel h-100">
              <div class="fr-panel-header"><h5><i class="fa-solid fa-chart-line me-2"></i>Income Trend (6 Months)</h5></div>
              <div class="fr-panel-body"><div style="height:260px"><canvas id="frIncomeChart"></canvas></div></div>
            </div>
          </div>
          <div class="col-lg-5">
            <div class="fr-panel h-100">
              <div class="fr-panel-header"><h5><i class="fa-solid fa-chart-pie me-2"></i>Team Levels</h5></div>
              <div class="fr-panel-body"><div style="height:260px"><canvas id="frTeamChart"></canvas></div></div>
            </div>
          </div>
        </div>

        <!-- Announcements -->
        <div class="fr-panel mb-4">
          <div class="fr-panel-header"><h5><i class="fa-solid fa-bullhorn me-2"></i>Latest Announcements</h5></div>
          <div class="fr-panel-body">
            <div id="frAnnouncements">
              <p class="text-center text-muted py-3">Loading…</p>
            </div>
          </div>
        </div>
      </div>
    </main>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../assets/js/franchise.js"></script>
  <script>
    const mockStats = { name:'Ravi Kumar', franchise_id:'FR-0024', rank:'gold', team:124, earnings:94820, leads:18 };

    function loadDashboard() {
      fetch('../backend/franchise-api.php?action=franchise_dashboard')
        .then(r => r.json())
        .then(res => { if (res.status === 'success') applyStats(res.data); else applyStats(mockStats); })
        .catch(() => applyStats(mockStats));
    }

    function applyStats(d) {
      document.getElementById('frUserName').textContent = d.name || 'Franchise Partner';
      document.getElementById('frFranchiseId').textContent = d.franchise_id || 'FR-0000';
      document.getElementById('statTeam').textContent = d.team || 0;
      document.getElementById('statEarnings').textContent = '₹' + (d.earnings||0).toLocaleString('en-IN');
      document.getElementById('statLeads').textContent = d.leads || 0;
      const rb = document.getElementById('frRankBadge');
      const rankMap = { bronze:'fr-rank-bronze', silver:'fr-rank-silver', gold:'fr-rank-gold', diamond:'fr-rank-diamond', legend:'fr-rank-legend' };
      const icons = { bronze:'fa-medal', silver:'fa-award', gold:'fa-star', diamond:'fa-gem', legend:'fa-crown' };
      const rank = (d.rank||'bronze').toLowerCase();
      rb.className = `fr-rank-badge ${rankMap[rank]||'fr-rank-bronze'}`;
      rb.innerHTML = `<i class="fa-solid ${icons[rank]||'fa-medal'}"></i> ${rank.charAt(0).toUpperCase()+rank.slice(1)}`;
    }

    function buildCharts() {
      const ic = document.getElementById('frIncomeChart').getContext('2d');
      new Chart(ic, {
        type: 'line',
        data: {
          labels: ['Sep','Oct','Nov','Dec','Jan','Feb'],
          datasets: [{ label:'Monthly Earnings (₹)', data:[8200,11400,14800,18200,22500,27600], borderColor:'#00D4AA', backgroundColor:'rgba(0,212,170,.12)', fill:true, tension:.4, pointBackgroundColor:'#00D4AA' }]
        },
        options: { responsive:true, maintainAspectRatio:false, plugins:{legend:{display:false}}, scales:{ x:{grid:{display:false}}, y:{ticks:{callback:v=>'₹'+v.toLocaleString('en-IN')}} } }
      });

      const tc = document.getElementById('frTeamChart').getContext('2d');
      new Chart(tc, {
        type: 'doughnut',
        data: {
          labels:['Direct (L1)','Level 2','Level 3','Level 4+'],
          datasets:[{ data:[28,42,35,19], backgroundColor:['#8B31D4','#FFBB00','#00D4AA','#3a86ff'], borderWidth:0 }]
        },
        options: { responsive:true, maintainAspectRatio:false, cutout:'60%', plugins:{legend:{position:'bottom',labels:{boxWidth:12}}} }
      });
    }

    function loadAnnouncements() {
      const mock = [
        { title:'February Meeting – Jaipur', category:'event', content:'15 Feb 2025 ko Jaipur mein franchise meeting hogi.', publish_date:'2025-02-01' },
        { title:'New Business Added', category:'update', content:'Organic Farming business ab aapke portfolio mein available hai.', publish_date:'2025-01-15' },
      ];
      const wrap = document.getElementById('frAnnouncements');
      wrap.innerHTML = mock.map(a => `
        <div class="fr-announce-item">
          <div class="d-flex justify-content-between align-items-center">
            <strong>${a.title}</strong>
            <small style="color:var(--fr-text-muted)">${a.publish_date}</small>
          </div>
          <p style="font-size:.88rem;color:var(--fr-text-muted);margin:.3rem 0 0">${a.content}</p>
        </div>`).join('');
    }

    function closeFrSidebar() {
      document.getElementById('frSidebar').classList.remove('open');
      document.getElementById('frSidebarOverlay').classList.remove('show');
    }
    function frLogout() { if (confirm('Logout?')) window.location.href = 'login.html'; }

    loadDashboard();
    buildCharts();
    loadAnnouncements();
  </script>
</body>
</html>
