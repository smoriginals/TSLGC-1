<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Income – UnifyHub Franchise</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../assets/css/franchise.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.2/dist/chart.umd.min.js"></script>
</head>
<body class="fr-body">
  <div class="fr-wrapper">
    <aside class="fr-sidebar" id="frSidebar">
      <div class="fr-sidebar-brand">
        <span class="fr-sb-logo">UH</span>
        <div><strong>UnifyHub</strong><small>Franchise Portal</small></div>
      </div>
      <div class="fr-sidebar-user">
        <div class="fr-su-avatar"><i class="fa-solid fa-store"></i></div>
        <div><strong>Franchise Partner</strong><small>FR-0000</small></div>
      </div>
      <nav class="fr-sidebar-nav">
        <p class="fr-sidebar-label">Menu</p>
        <a href="dashboard.html" class="fr-sidebar-link"><i class="fa-solid fa-gauge-high"></i> Dashboard</a>
        <a href="my-team.html" class="fr-sidebar-link"><i class="fa-solid fa-sitemap"></i> My Team</a>
        <a href="my-income.html" class="fr-sidebar-link active"><i class="fa-solid fa-indian-rupee-sign"></i> My Income</a>
        <a href="my-leads.html" class="fr-sidebar-link"><i class="fa-solid fa-user-plus"></i> My Leads</a>
        <a href="profile.html" class="fr-sidebar-link"><i class="fa-solid fa-circle-user"></i> Profile</a>
        <p class="fr-sidebar-label">System</p>
        <a href="../index.html" class="fr-sidebar-link" target="_blank"><i class="fa-solid fa-globe"></i> Website</a>
        <a href="#" class="fr-sidebar-link fr-logout" onclick="frLogout()"><i class="fa-solid fa-right-from-bracket"></i> Logout</a>
      </nav>
    </aside>
    <div class="fr-sidebar-overlay" id="frSidebarOverlay" onclick="closeFrSidebar()"></div>
    <main class="fr-main">
      <header class="fr-topbar">
        <div class="fr-tb-left">
          <button class="fr-tb-toggle" id="frSidebarToggle"><i class="fa-solid fa-bars"></i></button>
          <span class="fr-tb-title">My Income</span>
        </div>
        <div class="fr-tb-right">
          <button class="fr-tb-btn" id="frThemeToggle"><i class="fa-solid fa-moon"></i></button>
        </div>
      </header>
      <div class="fr-content">
        <!-- Income Summary -->
        <div class="fr-stat-grid mb-4">
          <div class="fr-stat-card">
            <div class="fr-sc-icon fr-sc-teal"><i class="fa-solid fa-wallet"></i></div>
            <div class="fr-sc-info"><span class="fr-sc-value" id="totalEarned">₹94,820</span><span class="fr-sc-label">Total Earned</span></div>
          </div>
          <div class="fr-stat-card">
            <div class="fr-sc-icon fr-sc-gold"><i class="fa-solid fa-calendar-check"></i></div>
            <div class="fr-sc-info"><span class="fr-sc-value" id="thisMonth">₹27,600</span><span class="fr-sc-label">This Month</span></div>
          </div>
          <div class="fr-stat-card">
            <div class="fr-sc-icon fr-sc-purple"><i class="fa-solid fa-hourglass-half"></i></div>
            <div class="fr-sc-info"><span class="fr-sc-value" id="pending">₹8,200</span><span class="fr-sc-label">Pending</span></div>
          </div>
          <div class="fr-stat-card">
            <div class="fr-sc-icon fr-sc-blue"><i class="fa-solid fa-arrow-trend-up"></i></div>
            <div class="fr-sc-info"><span class="fr-sc-value">+22%</span><span class="fr-sc-label">vs Last Month</span></div>
          </div>
        </div>

        <!-- Chart + Filter -->
        <div class="fr-panel mb-4">
          <div class="fr-panel-header">
            <h5><i class="fa-solid fa-chart-area me-2"></i>Income Chart</h5>
            <div class="btn-group btn-group-sm" id="incomeFilter" role="group">
              <button type="button" class="btn btn-outline-secondary active" data-period="monthly">Monthly</button>
              <button type="button" class="btn btn-outline-secondary" data-period="weekly">Weekly</button>
            </div>
          </div>
          <div class="fr-panel-body"><div style="height:280px"><canvas id="incomeChartFull"></canvas></div></div>
        </div>

        <!-- Income Table -->
        <div class="fr-panel">
          <div class="fr-panel-header">
            <h5><i class="fa-solid fa-table me-2"></i>Income Transactions</h5>
            <select class="form-select form-select-sm" id="incomeTypeFilter" style="width:160px">
              <option value="">All Types</option>
              <option>Direct Bonus</option>
              <option>Level Income</option>
              <option>Rank Bonus</option>
              <option>Matching Bonus</option>
            </select>
          </div>
          <div class="fr-panel-body p-0">
            <table class="fr-table w-100">
              <thead>
                <tr>
                  <th>#</th>
                  <th>Date</th>
                  <th>Type</th>
                  <th>From</th>
                  <th>Amount</th>
                  <th>Status</th>
                </tr>
              </thead>
              <tbody id="incomeTableBody"></tbody>
            </table>
          </div>
        </div>
      </div>
    </main>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../assets/js/franchise.js"></script>
  <script>
    const mockIncome = [
      {id:1, date:'2025-02-14', type:'Direct Bonus', from:'Anjali Verma', amount:500, status:'credited'},
      {id:2, date:'2025-02-12', type:'Level Income', from:'Suresh Yadav', amount:250, status:'credited'},
      {id:3, date:'2025-02-10', type:'Rank Bonus', from:'System', amount:2000, status:'credited'},
      {id:4, date:'2025-02-08', type:'Matching Bonus', from:'Team Match', amount:1500, status:'pending'},
      {id:5, date:'2025-02-06', type:'Direct Bonus', from:'Pooja Gupta', amount:500, status:'credited'},
      {id:6, date:'2025-02-04', type:'Level Income', from:'Manoj Sharma', amount:250, status:'credited'},
      {id:7, date:'2025-02-01', type:'Direct Bonus', from:'Vikram Singh', amount:500, status:'pending'},
    ];

    function escHtml(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

    function renderIncome(data) {
      const tbody = document.getElementById('incomeTableBody');
      if (!data.length) { tbody.innerHTML = '<tr><td colspan="6" class="text-center py-3 text-muted">No transactions</td></tr>'; return; }
      tbody.innerHTML = data.map((t,i) => `
        <tr>
          <td>${i+1}</td>
          <td>${t.date}</td>
          <td>${escHtml(t.type)}</td>
          <td>${escHtml(t.from)}</td>
          <td class="income-positive">+₹${t.amount.toLocaleString('en-IN')}</td>
          <td><span class="fr-status ${t.status === 'credited' ? 'active' : 'pending'}">${t.status}</span></td>
        </tr>`).join('');
    }

    let monthlyChart;
    function buildChart(period) {
      const ctx = document.getElementById('incomeChartFull').getContext('2d');
      if (monthlyChart) monthlyChart.destroy();
      const labels = period === 'monthly'
        ? ['Sep','Oct','Nov','Dec','Jan','Feb']
        : ['W1','W2','W3','W4','W5','W6','W7','W8'];
      const data = period === 'monthly'
        ? [8200,11400,14800,18200,22500,27600]
        : [3200,4100,5800,6200,7400,8100,6900,8500];
      monthlyChart = new Chart(ctx, {
        type: 'line',
        data: {
          labels,
          datasets: [{ label:'Income (₹)', data, borderColor:'#00D4AA', backgroundColor:'rgba(0,212,170,.12)', fill:true, tension:.4, pointBackgroundColor:'#00D4AA' }]
        },
        options: { responsive:true, maintainAspectRatio:false, plugins:{legend:{display:false}}, scales:{ x:{grid:{display:false}}, y:{ticks:{callback:v=>'₹'+v.toLocaleString('en-IN')}} } }
      });
    }

    document.getElementById('incomeFilter').addEventListener('click', function(e) {
      const btn = e.target.closest('[data-period]');
      if (!btn) return;
      this.querySelectorAll('button').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      buildChart(btn.dataset.period);
    });

    document.getElementById('incomeTypeFilter').addEventListener('change', function() {
      const val = this.value;
      renderIncome(val ? mockIncome.filter(t => t.type === val) : mockIncome);
    });

    function closeFrSidebar() {
      document.getElementById('frSidebar').classList.remove('open');
      document.getElementById('frSidebarOverlay').classList.remove('show');
    }
    function frLogout() { if (confirm('Logout?')) window.location.href = 'login.html'; }

    renderIncome(mockIncome);
    buildChart('monthly');
  </script>
</body>
</html>
